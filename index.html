<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA FAMILIA</title>
  <meta
    name="description"
    content="LA FAMILIA is an editorial and visual website to present its story, values, services, portfolio, blog, reviews and contact information."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --bg:#0d0f14;
      --bg-soft:#141821;
      --panel:rgba(255,255,255,.04);
      --panel-2:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.08);
      --text:#f5f7fb;
      --muted:rgba(245,247,251,.76);
      --faint:rgba(245,247,251,.42);
      --accent:#bc8d5d;
      --accent-soft:rgba(188,141,93,.16);
      --cream:#f0e0cc;
      --electric-blue:#2d6cff;
      --electric-purple:#7b2cff;
      --electric-violet:#9d4dff;
      --electric-red:#ff376d;
      --shadow:0 28px 80px rgba(0,0,0,.34);
      --max:1320px;
      --transition:280ms cubic-bezier(.16,1,.3,1);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Inter",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(46,108,255,.10), transparent 22%),
        linear-gradient(180deg,#0d0f14 0%,#131720 100%);
      color:var(--text);
      overflow-x:hidden;
      line-height:1.55;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img,video,canvas{
      display:block;
      max-width:100%;
    }

    button,input,textarea{
      font:inherit;
      color:inherit;
    }

    .container{
      width:min(calc(100% - 32px),var(--max));
      margin:0 auto;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:120;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      background:
        linear-gradient(120deg,
          rgba(32,72,255,.86) 0%,
          rgba(92,44,255,.82) 28%,
          rgba(170,56,255,.78) 52%,
          rgba(255,66,132,.80) 76%,
          rgba(72,172,255,.84) 100%);
      background-size:200% 200%;
      border-bottom:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 30px rgba(68,24,168,.20);
      animation:headerFlow 10s ease infinite;
    }

    .header-inner{
      min-height:84px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:20px;
    }

      appearance
