<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA FAMILIA</title>
  <meta
    name="description"
    content="LA FAMILIA is an editorial and visual website to present its story, values, services, portfolio, blog, reviews and contact information."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root{
      --bg:#0d0f14;
      --bg-soft:#141821;
      --panel:rgba(255,255,255,.04);
      --panel-2:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.08);
      --text:#f5f7fb;
      --muted:rgba(245,247,251,.76);
      --faint:rgba(245,247,251,.42);
      --accent:#bc8d5d;
      --accent-soft:rgba(188,141,93,.16);
      --cream:#f0e0cc;
      --electric-blue:#2d6cff;
      --electric-purple:#7b2cff;
      --electric-violet:#9d4dff;
      --electric-red:#ff376d;
      --review-red:#d94b63;
      --review-blue:#5f8dff;
      --shadow:0 28px 80px rgba(0,0,0,.34);
      --max:1320px;
      --transition:280ms cubic-bezier(.16,1,.3,1);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html{ scroll-behavior:smooth; }
    body{
      font-family:"Inter",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(46,108,255,.10), transparent 22%),
        linear-gradient(180deg,#0d0f14 0%,#131720 100%);
      color:var(--text);
      overflow-x:hidden;
      line-height:1.55;
    }
    a{ color:inherit; text-decoration:none; }
    img,video{ display:block; max-width:100%; }
    button,input,textarea{ font:inherit; color:inherit; }
    .container{
      width:min(calc(100% - 32px),var(--max));
      margin:0 auto;
    }
    .site-header{
      position:sticky;
      top:0;
      z-index:120;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      background:
        linear-gradient(120deg,
          rgba(32,72,255,.86) 0%,
          rgba(92,44,255,.82) 28%,
          rgba(170,56,255,.78) 52%,
          rgba(255,66,132,.80) 76%,
          rgba(72,172,255,.84) 100%);
      background-size:200% 200%;
      border-bottom:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 30px rgba(68,24,168,.20);
      animation:headerFlow 10s ease infinite;
    }
    .header-inner{
      min-height:94px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:20px;
    }
    .menu-btn{
      appearance:none;
      border:none;
      background:transparent;
      color:#fff;
      font-size:1.12rem;
      letter-spacing:.22em;
      text-transform:uppercase;
      cursor:pointer;
      font-weight:800;
      padding:14px 8px;
      margin-left:6px;
    }
    .brand{
      justify-self:center;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .brand img{
      width:auto;
      height:46px;
      object-fit:contain;
    }
    .header-spacer{
      justify-self:end;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:12px;
    }
    .header-cta-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.10);
      color:#ffffff;
      font-size:.78rem;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:700;
      cursor:pointer;
      transition:transform var(--transition), background var(--transition), border-color var(--transition);
      white-space:nowrap;
    }
    .header-cta-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.18);
      border-color:rgba(255,255,255,.34);
    }
    .menu-panel{
      position:fixed;
      inset:0 auto 0 0;
      width:min(420px,100%);
      background:rgba(14,15,18,.97);
      border-right:1px solid rgba(255,255,255,.08);
      transform:translateX(-102%);
      transition:transform var(--transition);
      z-index:140;
      padding:28px 24px 30px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      box-shadow:var(--shadow);
    }
    .menu-panel.open{ transform:translateX(0); }
    .menu-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:26px;
    }
    .menu-title{
      font-size:.76rem;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--faint);
    }
    .menu-close{
      border:none;
      background:transparent;
      color:var(--text);
      font-size:.82rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .menu-links{ display:grid; gap:16px; }
    .menu-links a{
      font-family:"Inter",sans-serif;
      font-size:clamp(1.9rem,5vw,3rem);
      line-height:.92;
      letter-spacing:-.04em;
      font-weight:800;
      transition:transform var(--transition), color var(--transition);
    }
    .menu-links a:hover{
      transform:translateX(8px);
      color:#fff;
    }
    .menu-socials{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:30px;
    }
    .menu-socials a{
      width:46px;
      height:46px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.03);
      transition:transform var(--transition), border-color var(--transition), background var(--transition);
    }
    .menu-socials a:hover{
      transform:translateY(-2px);
      border-color:rgba(188,141,93,.45);
      background:rgba(188,141,93,.08);
    }
    .menu-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.46);
      opacity:0;
      visibility:hidden;
      transition:opacity var(--transition), visibility var(--transition);
      z-index:130;
    }
    .menu-backdrop.show{
      opacity:1;
      visibility:visible;
    }
    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      padding:30px 0 90px;
      border-bottom:1px solid rgba(255,255,255,.05);
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(46,108,255,.12), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(123,44,255,.10), transparent 24%),
        linear-gradient(180deg,#0d0f14 0%,#141922 58%, #18283d 82%, #223f63 100%);
    }
    .hero::after{
      content:"";
      position:absolute;
      left:-4%;
      right:-4%;
      bottom:-120px;
      height:320px;
      z-index:1;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%, rgba(58,120,208,.18), transparent 30%),
        radial-gradient(circle at 50% 55%, rgba(76,145,230,.16), transparent 34%),
        radial-gradient(circle at 78% 40%, rgba(98,162,235,.20), transparent 30%),
        linear-gradient(180deg, rgba(26,44,67,0) 0%, rgba(38,72,112,.26) 54%, rgba(66,118,176,.34) 100%);
      filter:blur(24px);
      opacity:.95;
    }
    .hero-grid{
      width:100%;
      display:grid;
      gap:0;
      position:relative;
      z-index:2;
    }
    .hero-stage{
      position:relative;
      min-height:980px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding-top:34px;
    }
    .hero-paint{
      position:absolute;
      top:-10px;
      left:50%;
      width:min(1120px, 110vw);
      height:700px;
      transform:translateX(-50%);
      z-index:1;
      pointer-events:none;
      filter:blur(32px) saturate(1.2);
      opacity:1;
      background:
        radial-gradient(circle at 14% 50%, rgba(255,55,109,.82), transparent 24%),
        radial-gradient(circle at 32% 18%, rgba(94,42,255,.92), transparent 28%),
        radial-gradient(circle at 53% 60%, rgba(41,122,255,.84), transparent 26%),
        radial-gradient(circle at 72% 24%, rgba(163,77,255,.90), transparent 26%),
        radial-gradient(circle at 85% 60%, rgba(255,82,125,.60), transparent 24%),
        radial-gradient(circle at 60% 22%, rgba(80,126,255,.45), transparent 20%);
      mix-blend-mode:screen;
    }
    .hero-video-box{
      position:relative;
      z-index:3;
      width:min(100%, 720px);
      border-radius:32px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      min-height:380px;
      background:#0d0f12;
      box-shadow:0 28px 80px rgba(0,0,0,.35);
    }
    .hero-video-box video,
    .hero-video-box img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .hero-video-box::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(8,8,10,.16), rgba(8,8,10,.34));
      pointer-events:none;
    }
    /* CAMBIO 1: velocidad del marquee de valores de 24s → 38s */
    .values-layer{
      position:absolute;
      left:0;
      right:0;
      top:390px;
      z-index:5;
      overflow:hidden;
      white-space:nowrap;
      pointer-events:none;
      mask-image:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
      -webkit-mask-image:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
    }
    .values-track{
      display:flex;
      width:max-content;
      animation:marqueeLeft 38s linear infinite;
    }
    .values-group{
      display:flex;
      gap:64px;
      padding-right:64px;
    }
    .values-group span{
      font-family:"Inter",sans-serif;
      font-size:clamp(4.8rem,10.6vw,8.8rem);
      line-height:.84;
      letter-spacing:-.07em;
      text-transform:uppercase;
      font-weight:800;
      color:#ffffff;
      white-space:nowrap;
      text-shadow:0 10px 28px rgba(255,255,255,.08);
    }
    .hero-bottom{
      position:relative;
      z-index:6;
      margin-top:145px;
      width:min(100%, 1140px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:20px;
    }
    .hero-copy h1{
      font-family:"Inter",sans-serif;
      font-size:clamp(3rem,5.6vw,5rem);
      line-height:.94;
      letter-spacing:-.06em;
      font-weight:800;
      max-width:11ch;
      margin:0 auto 16px;
      color:#ffffff;
    }
    .hero-copy p{
      color:var(--muted);
      max-width:78ch;
      margin:0 auto;
      font-size:clamp(1.3rem, 1.8vw, 1.68rem);
      line-height:1.82;
      font-family:"Inter",sans-serif;
    }
    .services-link{
      display:inline-block;
      margin-top:8px;
      font-size:1rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:#dbe5ff;
      border-bottom:1px solid rgba(219,229,255,.5);
      padding-bottom:8px;
      transition:opacity var(--transition), transform var(--transition);
      font-weight:700;
    }
    .services-link:hover{
      opacity:.78;
      transform:translateY(-2px);
    }
    .sponsors-bar{
      width:100%;
      background:#ffffff;
      padding:24px 0;
      border-top:1px solid rgba(0,0,0,.05);
      border-bottom:1px solid rgba(0,0,0,.06);
      overflow:hidden;
    }
    .sponsors-track{
      display:flex;
      width:max-content;
      animation:marqueeLeft 24s linear infinite;
    }
    .sponsors-group{
      display:flex;
      align-items:center;
      gap:44px;
      padding-right:44px;
    }
    .sponsor-logo{
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      min-width:190px;
      height:104px;
      background:transparent;
      border:none;
      box-shadow:none;
      padding:0;
    }
    .sponsor-logo img{
      width:auto;
      max-width:310px;
      max-height:100px;
      object-fit:contain;
      mix-blend-mode:multiply;
    }
    .section{
      padding:110px 0;
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .about-section{
      position:relative;
      overflow:hidden;
      padding:120px 0;
      isolation:isolate;
      background:#161a22;
    }
    .about-bg{
      position:absolute;
      inset:0;
      z-index:0;
      background-image:
        linear-gradient(180deg, rgba(14,18,26,.38), rgba(14,18,26,.42)),
        url("assets/images/pexels-anatoleos-30912707.jpg");
      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;
      filter:saturate(1.02) brightness(1.02);
      transform:scale(1.03);
    }
    .about-bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(11,14,20,.24) 0%, rgba(11,14,20,.18) 30%, rgba(11,14,20,.28) 100%);
    }
    .about-section .about-shell{
      position:relative;
      z-index:2;
      width:min(calc(100% - 32px), 1440px);
      margin:0 auto;
    }
    .about-layout{
      display:grid;
      grid-template-columns:460px minmax(0, 1fr);
      align-items:center;
      gap:64px;
    }
    .about-image-side{
      width:100%;
      display:flex;
      justify-content:flex-start;
      align-items:stretch;
    }
    .founder-media-wrap{
      position:relative;
      width:100%;
      max-width:460px;
      margin-left:0;
    }
    .founder-glow{
      position:absolute;
      top:-30px;
      left:-28px;
      right:-28px;
      bottom:-30px;
      z-index:1;
      filter:blur(28px) saturate(1.8);
      opacity:.92;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 35%, rgba(45,108,255,.72), transparent 30%),
        radial-gradient(circle at 82% 22%, rgba(188,141,93,.64), transparent 26%),
        radial-gradient(circle at 50% 65%, rgba(123,44,255,.68), transparent 32%),
        radial-gradient(circle at 25% 70%, rgba(157,77,255,.60), transparent 28%),
        radial-gradient(circle at 75% 50%, rgba(255,102,157,.56), transparent 28%),
        radial-gradient(circle at 10% 10%, rgba(46,200,255,.50), transparent 22%),
        radial-gradient(circle at 90% 80%, rgba(255,210,64,.44), transparent 22%);
    }
    .founder-media{
      position:relative;
      z-index:2;
      width:100%;
      height:620px;
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 28px 70px rgba(0,0,0,.24);
      background:rgba(255,255,255,.06);
    }
    .founder-media img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center top;
      background:rgba(10,12,16,.18);
      image-rendering:-webkit-optimize-contrast;
      image-rendering:crisp-edges;
      -webkit-font-smoothing:antialiased;
      filter:contrast(1.05) brightness(1.02) saturate(1.08);
    }
    .about-copy{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-start;
      text-align:left;
      color:#ffffff;
      max-width:760px;
    }
    .about-copy .kicker{
      margin-bottom:10px;
      color:#ffffff;
      animation:none;
      display:inline-block;
      font-size:.88rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-weight:800;
    }
    .about-copy h2{
      font-family:"Inter",sans-serif;
      font-weight:800;
      letter-spacing:-.04em;
      font-size:clamp(2.8rem,5vw,5rem);
      line-height:.94;
      margin-bottom:22px;
      color:#ffffff;
      max-width:11ch;
    }
    .about-copy h3{
      font-family:"Inter",sans-serif;
      font-weight:800;
      letter-spacing:-.04em;
      font-size:clamp(2rem,3.5vw,3.5rem);
      line-height:1;
      margin-bottom:18px;
      color:#ffffff;
      max-width:15ch;
    }
    .about-copy p{
      color:rgba(255,255,255,.93);
      margin-bottom:18px;
      max-width:62ch;
      font-size:1.04rem;
      line-height:1.82;
    }
    .btn-outline{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:max-content;
      min-height:48px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.10);
      color:#ffffff;
      font-size:.82rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      transition:transform var(--transition), border-color var(--transition), background var(--transition);
      cursor:pointer;
    }
    .btn-outline:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.34);
      background:rgba(255,255,255,.16);
    }
    .about-overlay{
      position:fixed;
      inset:0;
      z-index:155;
      display:flex;
      justify-content:flex-end;
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:opacity var(--transition), visibility var(--transition);
      background:rgba(7,10,16,.18);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      overflow-y:auto;
      overscroll-behavior:contain;
    }
    .about-overlay.show{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }
    .about-overlay-backdrop{
      flex:1 1 auto;
      min-height:100%;
    }
    .about-overlay-panel{
      width:min(760px, 100%);
      min-height:100vh;
      padding:42px 34px 54px;
      border-left:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(17,20,29,.40), rgba(17,20,29,.20));
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:-24px 0 70px rgba(0,0,0,.24);
      overflow-y:auto;
      overflow-x:hidden;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,.35) transparent;
      -webkit-overflow-scrolling:touch;
    }
    .about-overlay-panel::-webkit-scrollbar{ width:10px; }
    .about-overlay-panel::-webkit-scrollbar-track{ background:transparent; }
    .about-overlay-panel::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.28);
      border-radius:999px;
    }
    .about-overlay-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:26px;
      position:sticky;
      top:0;
      padding-bottom:14px;
      background:linear-gradient(180deg, rgba(16,19,28,.72), rgba(16,19,28,.12));
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      z-index:2;
    }
    .about-overlay-kicker{
      font-size:.82rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-weight:800;
      color:#dfe8ff;
    }
    .about-overlay-close{
      border:none;
      background:transparent;
      color:#fff;
      font-size:.8rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .about-overlay-panel h3{
      font-family:"Inter",sans-serif;
      font-weight:800;
      letter-spacing:-.04em;
      font-size:clamp(2.2rem,4vw,4rem);
      line-height:.94;
      margin-bottom:18px;
      color:#ffffff;
      max-width:10ch;
    }
    .about-overlay-intro{
      color:rgba(255,255,255,.88);
      font-size:1.05rem;
      line-height:1.8;
      margin-bottom:26px;
      max-width:58ch;
    }
    .choose-grid{
      display:grid;
      gap:18px;
      padding-bottom:12px;
    }
    .choose-item{
      padding:20px 20px 18px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      box-shadow:0 14px 34px rgba(0,0,0,.16);
    }
    .choose-item h4{
      font-size:1.1rem;
      font-weight:800;
      letter-spacing:-.02em;
      margin-bottom:10px;
      color:#ffffff;
    }
    .choose-item p{
      color:rgba(255,255,255,.86);
      font-size:1rem;
      line-height:1.75;
      margin:0;
      max-width:none;
    }
    /* CAMBIO 5: Services stage – fondo con colores de marca vibrantes */
    .services-showcase{ display:grid; gap:30px; }
    .services-stage{
      position:relative;
      overflow:hidden;
      border-radius:36px;
      min-height:660px;
      padding:42px 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(45,108,255,.85), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(255,55,109,.80), transparent 28%),
        radial-gradient(circle at 50% 0%, rgba(123,44,255,.78), transparent 24%),
        radial-gradient(circle at 20% 80%, rgba(41,180,255,.72), transparent 26%),
        radial-gradient(circle at 80% 80%, rgba(255,160,55,.68), transparent 26%),
        radial-gradient(circle at 50% 55%, rgba(157,77,255,.60), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,66,132,.50), transparent 22%),
        linear-gradient(180deg, rgba(10,12,22,.55), rgba(12,14,24,.60));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow);
      isolation:isolate;
    }
    .services-stage::before{
      content:"";
      position:absolute;
      inset:-8%;
      pointer-events:none;
      z-index:0;
      background:
        radial-gradient(circle at 50% 0%, rgba(108,186,255,.88), transparent 18%),
        radial-gradient(circle at 54% 3%, rgba(255,221,96,.70), transparent 13%),
        radial-gradient(circle at 10% 50%, rgba(45,108,255,.65), transparent 20%),
        radial-gradient(circle at 90% 50%, rgba(255,55,109,.65), transparent 20%),
